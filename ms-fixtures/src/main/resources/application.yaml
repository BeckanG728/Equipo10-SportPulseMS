spring:
  application:
    name: ms-fixtures
  jackson:
    deserialization:
      fail-on-unknown-properties: false

api-football:
  key: ${API_KEY}
  host-url: https://v3.football.api-sports.io

ms-teams:
  host-url: ${TEAMS_SERVICE_URL}

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    es.bytescolab.ms_fixtures: DEBUG
    feign: DEBUG

server:
  port: 8085
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
